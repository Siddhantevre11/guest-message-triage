<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Besty — Guest Message Inbox</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      max-width: 640px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 0.25rem;
    }
    p.subtitle {
      color: #666;
      margin-top: 0;
      margin-bottom: 2rem;
    }
    textarea {
      width: 100%;
      min-height: 6rem;
      font-size: 1rem;
      padding: 0.75rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
      font-family: inherit;
    }
    button {
      margin-top: 0.75rem;
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      cursor: pointer;
    }
    button:hover {
      background: #333;
    }
    .error {
      color: #b00020;
      margin-top: 0.5rem;
    }
    .result-card {
      margin-top: 2rem;
      padding: 1.25rem 1.5rem;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      background: #fff;
    }
    .result-card.escalated {
      border-color: #f0b429;
      background: #fffaf0;
    }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.7rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      background: #eef2ff;
      color: #3730a3;
    }
    .badge.escalated {
      background: #fef3c7;
      color: #92400e;
    }
    .quoted-message {
      color: #555;
      font-style: italic;
      margin: 0.5rem 0 1rem;
    }
    .action-label {
      margin-top: 0.75rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>Guest Message Inbox</h1>
  <p class="subtitle">Paste a guest message to see how Besty would triage it.</p>

  <form method="post" action="/triage">
    <textarea name="message" placeholder="e.g. The bathroom sink won't stop leaking">{{ message or "" }}</textarea>
    <br>
    <button type="submit">Triage message</button>
  </form>

  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}

  {% if result %}
    <div class="result-card {{ 'escalated' if result.is_escalated else '' }}">
      <span class="badge {{ 'escalated' if result.is_escalated else '' }}">{{ result.category }}</span>
      <p class="quoted-message">"{{ message }}"</p>
      <p>{{ result.summary }}</p>
      <p class="action-label">{{ result.action_label }}</p>
    </div>
  {% endif %}
</body>
</html>
